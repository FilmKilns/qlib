qlib_init:
  provider_uri: "~/.qlib/qlib_data/qlib_data_1776001753032"
  region: cn

task:
  model:
    class: LGBModel
    module_path: qlib.contrib.model.gbdt
    kwargs:
      objective: "binary"
      metric: "auc"
      num_boost_round: 1000
      early_stopping_rounds: 50
      learning_rate: 0.02
      max_depth: 6
      num_leaves: 40
      lambda_l1: 1.0
      lambda_l2: 1.0
      min_child_samples: 50
      min_split_gain: 0.01
      subsample: 0.8
      colsample_bytree: 0.8
      num_threads: 20
  dataset:
    class: DatasetH
    module_path: qlib.data.dataset
    kwargs:
      handler:
        class: Alpha158
        module_path: qlib.contrib.data.handler
        kwargs:
          start_time: 2015-01-01
          end_time: 2026-04-10
          fit_start_time: 2015-01-01
          fit_end_time: 2022-12-31
          instruments: 'all'   # 必须明确路径
          label: ["Ref($close, -5) > $close"]       # 分类标签
      segments:
        train: [2015-01-01, 2022-12-31]
        valid: [2023-01-01, 2024-06-30]
        test:  [2024-07-01, 2025-03-31]

port_analysis_config: &port_analysis_config
  strategy:
    class: TopkDropoutStrategy
    module_path: qlib.contrib.strategy.strategy
    kwargs:
      topk: 6
      n_drop: 2
      signal: <PRED>
  backtest:
    start_time: 2025-04-01
    end_time: 2026-04-10
    account: 100000000
    benchmark: "SH000300"
    exchange_kwargs:
      limit_threshold: 0.1
      deal_price: vwap
      open_cost: 0.0003
      close_cost: 0.0013
      min_cost: 0.05
      slippage: 0.001

record:
  - class: SignalRecord
    module_path: qlib.workflow.record_temp
  - class: PortAnaRecord
    module_path: qlib.workflow.record_temp
    kwargs:
      config: *port_analysis_config