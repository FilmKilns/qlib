qlib_init:
  provider_uri: "~/.qlib/qlib_data/qlib_data_1775983012349"
  region: cn

trainer:
  class: RollingTrainer
  kwargs:
    train_period: 1825  # 5年，以天为单位
    test_period: 365   # 1年
    step: 180          # 6个月

task:
  model:
    class: LGBModel
    module_path: qlib.contrib.model.gbdt
    kwargs:
      loss: mse
      num_boost_round: 2000
      early_stopping_rounds: 100
      learning_rate: 0.005
      max_depth: 4
      num_leaves: 20
      lambda_l1: 10.0
      lambda_l2: 10.0
      min_child_samples: 100
      min_split_gain: 0.1
      subsample: 0.7
      colsample_bytree: 0.6
      num_threads: 20
  dataset:
    class: DatasetH
    module_path: qlib.data.dataset
    kwargs:
      handler:
        class: Alpha158
        module_path: qlib.contrib.data.handler
        kwargs:
          label: ["Ref($close, -5) / Ref($close, -1) - 1"]   # 预测未来5日收益
          start_time: 2015-07-10
          end_time: 2026-04-10
          fit_start_time: 2015-07-10
          fit_end_time: 2025-03-31
          instruments: 'all'
      segments:
        train: [2015-07-10, 2021-12-31]
        valid: [2022-01-01, 2023-12-31]
        test: [2024-01-01, 2025-03-31]

port_analysis_config: &port_analysis_config
  strategy:
    class: TopkDropoutStrategy
    module_path: qlib.contrib.strategy.strategy
    kwargs:
      topk: 6
      n_drop: 2
      signal: <PRED>
  backtest:
    start_time: 2025-04-01
    end_time: 2026-04-10
    account: 100000000
    benchmark: "SH000300"
    exchange_kwargs:
      limit_threshold: 0.1
      deal_price: vwap
      open_cost: 0.0003
      close_cost: 0.0013
      min_cost: 0.05
      slippage: 0.001

record:
  - class: SignalRecord
    module_path: qlib.workflow.record_temp
  - class: PortAnaRecord
    module_path: qlib.workflow.record_temp
    kwargs:
      config: *port_analysis_config