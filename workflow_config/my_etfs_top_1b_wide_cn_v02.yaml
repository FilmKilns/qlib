qlib_init:
  provider_uri: "~/.qlib/qlib_data/qlib_data_1776230239002"
  region: cn

trainer:
  class: RollingTrainer
  kwargs:
    train_period: 1825  # 5年，以天为单位
    test_period: 365   # 1年
    step: 180          # 6个月

task:
  model:
    class: LGBModel
    module_path: qlib.contrib.model.gbdt
    kwargs:
      objective: regression
      metric: mse
      num_boost_round: 500
      early_stopping_rounds: 50
      learning_rate: 0.01
      max_depth: 4
      num_leaves: 15
      lambda_l1: 5.0
      lambda_l2: 5.0
      min_child_samples: 100
      subsample: 0.7
      colsample_bytree: 0.7
      num_threads: 20
  dataset:
    class: DatasetH
    module_path: qlib.data.dataset
    kwargs:
      handler:
        class: MyAlpha158
        module_path: qlib.contrib.data.my_handler
        kwargs:
          label: ["Ref($close, -5) / Ref($close, -1) - 1"]   # 预测未来5日收益
          start_time: 2017-01-01
          end_time: 2026-04-10
          fit_start_time: 2017-01-01
          fit_end_time: 2022-12-31
          instruments: 'all'
          # 自定义精选因子列表
          custom_factors:
            - 'ROC($close, 5)'
            - 'ROC($close, 10)'
            - 'ROC($close, 20)'
            - 'ROC($close, 60)'
            - 'MA($close, 5) / $close'
            - 'MA($close, 10) / $close'
            - 'MA($close, 20) / $close'
            - 'STD($close, 5)'
            - 'STD($close, 20)'
            - 'CORR($close, $volume, 20)'
            - '($high - $low) / $close'
            - '($close - $open) / $open'
            - 'SUM($volume, 5) / SUM($volume, 20)'
            - 'RANK($close)'
            - '($close - Ref($close, 20)) / Ref($close, 20)'  # 20日收益率
            - '($volume - MA($volume, 20)) / MA($volume, 20)'  # 成交量变化率
      segments:
        train: [2017-01-01, 2022-12-31]
        valid: [2023-01-01, 2024-06-30]
        test:  [2024-07-01, 2025-03-31]

port_analysis_config: &port_analysis_config
  strategy:
    class: TopkDropoutStrategy
    module_path: qlib.contrib.strategy.strategy
    kwargs:
      topk: 8
      n_drop: 3
      signal: <PRED>
  backtest:
    start_time: 2025-04-01
    end_time: 2026-04-07
    account: 100000000
    benchmark: "SH000300"
    exchange_kwargs:
      limit_threshold: 0.1
      deal_price: vwap
      open_cost: 0.0003
      close_cost: 0.0013
      min_cost: 0.05
      slippage: 0.001

record:
  - class: SignalRecord
    module_path: qlib.workflow.record_temp
  - class: PortAnaRecord
    module_path: qlib.workflow.record_temp
    kwargs:
      config: *port_analysis_config
